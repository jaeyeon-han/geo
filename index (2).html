<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시험 출제용 지도</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    /* ── 디자인 토큰 ── */
    :root {
      --accent: #1a4d8c;
      --accent-light: #e8eef4;
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #525252;
      --text-muted: #737373;
      --border: #d4d4d4;
      --border-light: #e5e5e5;
      --map-fill: #e0e0e0;
      --map-stroke: #888888;
      --map-bg: #fafafa;
      --radius: 8px;
      --transition: 0.25s ease;
    }

    /* 기본 설정 */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 전체 레이아웃 */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem;
    }

    /* 카드 — 플랫 + 테두리 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    /* 헤더 */
    .header-card h1 {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.625rem;
      padding-bottom: 0.625rem;
      border-bottom: 2px solid var(--accent);
      letter-spacing: -0.02em;
    }

    .header-card .guide {
      font-size: 0.875rem;
      color: var(--text-secondary);
      list-style: none;
    }

    .header-card .guide li {
      padding-left: 1rem;
      margin-top: 0.375rem;
      position: relative;
    }

    .header-card .guide li::before {
      content: "·";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    /* 섹션 제목 공통 */
    .section-title {
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.875rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-light);
    }

    /* 도구 모음 */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .toolbar-label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .color-picker-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .color-btn {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
    }

    .color-btn:hover {
      transform: scale(1.08);
      border-color: var(--text-muted);
    }

    .color-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
      transform: scale(1.05);
    }

    .btn {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .btn-reset {
      background: var(--surface);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      background: var(--bg);
      border-color: var(--text-muted);
      color: var(--text);
    }

    .btn-reset:active {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .btn-print {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
    }

    .btn-print:hover {
      background: #153d6e;
      border-color: #153d6e;
    }

    /* 메인 작업 영역 */
    .workspace {
      display: grid;
      grid-template-columns: 1fr minmax(240px, 300px);
      gap: 1rem;
      align-items: start;
    }

    .map-card {
      margin-bottom: 0;
    }

    .map-area {
      background: var(--map-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      aspect-ratio: 320 / 460;
      max-height: min(70vh, 620px);
      transition: border-color var(--transition);
    }

    #map-svg {
      width: 100%;
      height: 100%;
      max-width: 360px;
      display: block;
    }

    .map-region {
      fill: var(--map-fill);
      stroke: var(--map-stroke);
      stroke-width: 1.2;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: fill 0.3s ease, stroke 0.25s ease, transform 0.2s ease;
      transform-origin: center;
    }

    .map-region.is-touching {
      stroke: var(--accent);
      stroke-width: 2;
      opacity: 0.9;
    }

    .map-region:hover {
      stroke: var(--text-secondary);
      stroke-width: 1.5;
    }

    .map-region.is-selected {
      stroke: var(--accent);
      stroke-width: 2;
    }

    .map-region.is-clicked {
      animation: region-pulse 0.4s ease;
    }

    @keyframes region-pulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    .region-label {
      font-size: 11px;
      font-weight: 600;
      fill: var(--text-secondary);
      pointer-events: none;
      user-select: none;
    }

    /* 사이드 패널 */
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .side-panel .card {
      margin-bottom: 0;
    }

    .panel-section {
      margin-bottom: 1rem;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .panel-section h3 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.04em;
    }

    .list-area {
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      min-height: 100px;
      max-height: 180px;
      overflow-y: auto;
      padding: 0.375rem;
    }

    .list-empty {
      color: var(--text-muted);
      font-size: 0.8125rem;
      text-align: center;
      padding: 1.25rem 0.5rem;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4375rem 0.5rem;
      border-radius: 4px;
      font-size: 0.875rem;
      color: var(--text);
      animation: list-enter 0.3s ease;
    }

    @keyframes list-enter {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .list-item:hover {
      background: var(--accent-light);
    }

    .list-item .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* 인쇄 전용 요소 (화면에서는 숨김) */
    .print-only {
      display: none;
    }

    /* 모바일: 세로 스택 + 터치 영역 확대 */
    @media (max-width: 768px) {
      .page {
        padding: 0.875rem;
      }

      .header-card h1 {
        font-size: 1.1875rem;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .map-area {
        max-height: none;
        padding: 0.75rem;
      }

      .map-region {
        stroke-width: 2;
      }

      .color-btn {
        width: 44px;
        height: 44px;
      }

      .btn-reset {
        min-height: 44px;
        padding: 0.625rem 1.125rem;
      }
    }

    /* 인쇄: 지도만 A4 한 페이지에 출력 */
    @media print {
      @page {
        size: A4 portrait;
        margin: 15mm;
      }

      * {
        animation: none !important;
        transition: none !important;
      }

      body {
        background: #fff;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page {
        max-width: none;
        padding: 0;
      }

      .no-print {
        display: none !important;
      }

      .print-only {
        display: block;
      }

      .print-title {
        font-size: 16pt;
        font-weight: 700;
        text-align: center;
        margin-bottom: 6mm;
        padding-bottom: 3mm;
        border-bottom: 1.5pt solid #1a1a1a;
      }

      .card {
        border: none;
        border-radius: 0;
        padding: 0;
        margin-bottom: 0;
        box-shadow: none;
      }

      .workspace {
        display: block;
      }

      .map-card {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .section-title {
        display: none;
      }

      .map-area {
        border: 1pt solid #666;
        aspect-ratio: unset;
        max-height: none;
        height: auto;
        padding: 0;
        page-break-inside: avoid;
        break-inside: avoid;
        display: flex;
        justify-content: center;
        background: #fff;
      }

      #map-svg {
        width: 100%;
        max-width: 170mm;
        height: auto;
        max-height: 230mm;
        margin: 0 auto;
      }

      #map-svg rect {
        fill: #fff !important;
      }

      .map-region {
        stroke: #555 !important;
        stroke-width: 0.6pt !important;
      }

      .map-region.is-selected {
        stroke: #1a1a1a !important;
        stroke-width: 1pt !important;
      }

      .region-label {
        fill: #333 !important;
        font-size: 9pt;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- 제목 및 사용 안내 -->
    <header class="card header-card no-print">
      <h1>시험 출제용 지도</h1>
      <ul class="guide">
        <li>지도에서 지역을 클릭하면 선택한 색으로 칠해집니다.</li>
        <li>라벨(이름)을 추가하면 시험 문제에 쓸 수 있는 빈칸 지도를 만들 수 있습니다.</li>
        <li>완성된 지도는 캡처하거나 인쇄해서 활용하세요.</li>
      </ul>
    </header>

    <!-- 메인 작업 영역: 지도 + 도구·목록 패널 -->
    <main class="workspace">

      <!-- 지도 -->
      <section class="card map-card">
        <h1 class="print-only print-title">시험 출제용 지도</h1>
        <h2 class="section-title">지도</h2>
        <div class="map-area" id="map-area">
          <!-- 우리나라 행정구역 간단 지도 (6개 지역) -->
          <svg id="map-svg" viewBox="0 0 320 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="우리나라 행정구역 지도">
            <!-- 배경 -->
            <rect x="0" y="0" width="320" height="460" fill="#fafafa" rx="4"/>

            <!-- 강원 (동북부) -->
            <path id="region-gangwon" class="map-region" data-id="gangwon" data-name="강원"
              d="M 148 18 L 218 28 L 248 55 L 255 110 L 240 168 L 210 182 L 188 155 L 172 105 L 155 55 Z"
              aria-label="강원"/>
            <text class="region-label" x="205" y="105" text-anchor="middle">강원</text>

            <!-- 서울 (서북부 중심) -->
            <path id="region-seoul" class="map-region" data-id="seoul" data-name="서울"
              d="M 108 88 L 158 92 L 155 132 L 105 128 Z"
              aria-label="서울"/>
            <text class="region-label" x="131" y="116" text-anchor="middle">서울</text>

            <!-- 전라 (서남부) -->
            <path id="region-jeolla" class="map-region" data-id="jeolla" data-name="전라"
              d="M 58 148 L 118 142 L 148 175 L 155 230 L 140 290 L 105 330 L 68 295 L 52 230 L 48 185 Z"
              aria-label="전라"/>
            <text class="region-label" x="98" y="240" text-anchor="middle">전라</text>

            <!-- 경상 (동남부) -->
            <path id="region-gyeongsang" class="map-region" data-id="gyeongsang" data-name="경상"
              d="M 168 178 L 228 168 L 258 215 L 262 275 L 248 320 L 215 340 L 188 310 L 172 250 L 165 210 Z"
              aria-label="경상"/>
            <text class="region-label" x="218" y="260" text-anchor="middle">경상</text>

            <!-- 부산 (남동부 해안) -->
            <path id="region-busan" class="map-region" data-id="busan" data-name="부산"
              d="M 238 328 L 278 322 L 285 355 L 245 362 Z"
              aria-label="부산"/>
            <text class="region-label" x="262" y="346" text-anchor="middle">부산</text>

            <!-- 제주 (남쪽 섬) -->
            <path id="region-jeju" class="map-region" data-id="jeju" data-name="제주"
              d="M 108 400 Q 160 388 212 400 Q 218 420 160 428 Q 102 420 108 400 Z"
              aria-label="제주"/>
            <text class="region-label" x="160" y="416" text-anchor="middle">제주</text>
          </svg>
        </div>
      </section>

      <!-- 도구·목록 패널 -->
      <aside class="side-panel no-print">

        <!-- 색상·초기화 도구 -->
        <section class="card tools-card">
          <h2 class="section-title">도구</h2>
          <div class="toolbar">
            <span class="toolbar-label">색상 선택</span>
            <div class="color-picker-group" id="color-picker">
              <button class="color-btn active" data-color="#d4d4d4" style="background:#d4d4d4;" title="연회색" aria-label="연회색"></button>
              <button class="color-btn" data-color="#a3a3a3" style="background:#a3a3a3;" title="회색" aria-label="회색"></button>
              <button class="color-btn" data-color="#737373" style="background:#737373;" title="진회색" aria-label="진회색"></button>
              <button class="color-btn" data-color="#525252" style="background:#525252;" title="어두운 회색" aria-label="어두운 회색"></button>
              <button class="color-btn" data-color="#1a1a1a" style="background:#1a1a1a;" title="검정" aria-label="검정"></button>
            </div>
            <button class="btn btn-reset" id="btn-reset" type="button">전체 초기화</button>
            <button class="btn btn-print" id="btn-print" type="button">인쇄</button>
          </div>
        </section>

        <!-- 선택 목록 -->
        <section class="card panel-card">
          <h2 class="section-title">선택 목록</h2>

          <div class="panel-section">
            <h3>선택한 지역</h3>
            <div class="list-area" id="region-list">
              <p class="list-empty">지역을 클릭하면 여기에 표시됩니다.</p>
            </div>
          </div>

          <div class="panel-section">
            <h3>라벨 목록</h3>
            <div class="list-area" id="label-list">
              <p class="list-empty">라벨 기능은 추후 추가됩니다.</p>
            </div>
          </div>
        </section>

      </aside>

    </main>
  </div>

  <script>
    // ── 안내 문구 (가상 데이터 placeholder) ──
    const PLACEHOLDER = {
      region: "지역을 클릭하면 여기에 표시됩니다.",
      label: "라벨 기능은 추후 추가됩니다."
    };

    const DEFAULT_FILL = "#e0e0e0";
    const state = {
      selectedColor: "#d4d4d4",
      regions: [],
      labels: []
    };

    // ── DOM 참조 ──
    const colorPicker = document.getElementById("color-picker");
    const btnReset = document.getElementById("btn-reset");
    const btnPrint = document.getElementById("btn-print");
    const regionList = document.getElementById("region-list");
    const labelList = document.getElementById("label-list");
    const mapRegions = document.querySelectorAll(".map-region");

    // ── 지역 선택 (클릭·터치 공통) ──
    function selectRegion(el) {
      const id = el.dataset.id;
      const name = el.dataset.name;
      const color = state.selectedColor;

      el.style.fill = color;
      el.classList.add("is-selected");
      el.classList.remove("is-clicked");
      void el.offsetWidth;
      el.classList.add("is-clicked");

      const existing = state.regions.find(r => r.id === id);
      if (existing) {
        existing.color = color;
      } else {
        state.regions.push({ id, name, color });
      }

      renderRegionList();
    }

    // ── 색상 선택 ──
    colorPicker.addEventListener("click", (e) => {
      const btn = e.target.closest(".color-btn");
      if (!btn) return;

      colorPicker.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.selectedColor = btn.dataset.color;
    });

    // ── 지역 선택: pointer 이벤트 (클릭·터치 통합) ──
    mapRegions.forEach(el => {
      el.addEventListener("pointerdown", (e) => {
        if (e.pointerType === "touch") {
          el.classList.add("is-touching");
        }
      });

      el.addEventListener("pointerup", (e) => {
        el.classList.remove("is-touching");
        if (e.pointerType === "mouse" && e.button !== 0) return;
        selectRegion(el);
      });

      el.addEventListener("pointercancel", () => {
        el.classList.remove("is-touching");
      });
    });

    // pointer 미지원 브라우저 폴백
    if (!window.PointerEvent) {
      let lastTouchTime = 0;

      mapRegions.forEach(el => {
        el.addEventListener("touchstart", () => {
          el.classList.add("is-touching");
        });

        el.addEventListener("touchend", (e) => {
          e.preventDefault();
          el.classList.remove("is-touching");
          lastTouchTime = Date.now();
          selectRegion(el);
        });

        el.addEventListener("click", (e) => {
          if (Date.now() - lastTouchTime < 400) {
            e.preventDefault();
            return;
          }
          selectRegion(el);
        });
      });
    }

    // ── 인쇄 ──
    btnPrint.addEventListener("click", () => window.print());

    // ── 전체 초기화 ──
    btnReset.addEventListener("click", () => {
      if (!confirm("선택한 지역과 라벨을 모두 지울까요?")) return;

      state.regions = [];
      state.labels = [];

      mapRegions.forEach(el => {
        el.style.fill = DEFAULT_FILL;
        el.classList.remove("is-selected", "is-clicked", "is-touching");
      });

      renderRegionList();
      renderLabelList();
    });

    // ── 선택 지역 목록 렌더링 ──
    function renderRegionList() {
      if (state.regions.length === 0) {
        regionList.innerHTML = `<p class="list-empty">${PLACEHOLDER.region}</p>`;
        return;
      }

      regionList.innerHTML = state.regions.map(r => `
        <div class="list-item">
          <span class="color-dot" style="background:${r.color}"></span>
          <span>${r.name}</span>
        </div>
      `).join("");
    }

    // ── 라벨 목록 렌더링 ──
    function renderLabelList() {
      if (state.labels.length === 0) {
        labelList.innerHTML = `<p class="list-empty">${PLACEHOLDER.label}</p>`;
        return;
      }

      labelList.innerHTML = state.labels.map(l => `
        <div class="list-item">
          <span>${l.text}</span>
        </div>
      `).join("");
    }

    // 초기 렌더링
    renderRegionList();
    renderLabelList();
  </script>
</body>
</html>
